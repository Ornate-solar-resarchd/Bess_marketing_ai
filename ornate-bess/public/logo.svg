<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="60" fill="#020817"/>
  
  <!-- Logo Mark - Battery with gradient -->
  <g>
    <!-- Battery outline -->
    <rect x="10" y="15" width="30" height="30" rx="2" fill="none" stroke="#22c55e" stroke-width="2"/>
    <!-- Battery terminal -->
    <rect x="42" y="22" width="2" height="16" fill="#22c55e"/>
    <!-- Battery fill indicator -->
    <rect x="13" y="18" width="24" height="24" rx="1" fill="url(#gradientFill)"/>
  </g>
  
  <!-- Text - "Ornate Solar" -->
  <text x="60" y="38" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" fill="#ffffff">
    Ornate Solar
  </text>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradientFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
